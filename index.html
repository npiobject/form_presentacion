<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Telegram</title>
    <meta name="description" content="Formulario minimalista para registrar usuario de Telegram">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Color Palette */
            --bg-color: #0c0a15;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --input-bg: rgba(0, 0, 0, 0.2);
            --input-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            padding: 48px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Telegram Logo Animation */
        .icon-container {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px var(--accent-glow);
            transition: transform 0.3s ease;
        }
        
        .card:hover .icon-container {
            transform: scale(1.05) rotate(-5deg);
        }

        .icon-container svg {
            width: 28px;
            height: 28px;
            fill: white;
            margin-right: 2px;
            margin-top: 2px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
            font-weight: 400;
        }

        .form-group {
            text-align: left;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #cbd5e1;
            letter-spacing: 0.02em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-prefix {
            position: absolute;
            left: 16px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 38px;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        input:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        input:focus {
            border-color: var(--accent-color);
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        input:focus ~ .input-prefix {
            color: var(--accent-hover);
        }

        input::placeholder {
            color: #475569;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-color), #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        button:hover::after {
            left: 100%;
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
        }

        .success-state {
            background: linear-gradient(135deg, #10b981, #059669) !important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2) !important;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <!-- Telegram SVG Icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
        </div>

        <h1>Apúntate al taller online de OpenClaw</h1>
        <p>Déjanos tu usuario de Telegram para enviarte el enlace de acceso e información exclusiva sobre el taller.</p>
        
        <form id="telegramForm">
            <div class="form-group">
                <label for="telegramUser">Usuario Telegram</label>
                <div class="input-wrapper">
                    <span class="input-prefix">@</span>
                    <input type="text" id="telegramUser" name="telegramUser" placeholder="nombre_usuario" required autocomplete="off" spellcheck="false" pattern="[a-zA-Z0-9_]{5,32}" title="Debe contener entre 5 y 32 caracteres alfanuméricos o guiones bajos">
                </div>
            </div>
            
            <button type="submit" id="submitBtn">Inscribirme al Taller</button>
        </form>
    </div>

    <script>
        document.getElementById('telegramForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            
            // Loading state
            btn.textContent = 'Verificando...';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';
            
            // Simulate API call
            setTimeout(() => {
                // Success state
                btn.textContent = '¡Cuenta Vinculada!';
                btn.classList.add('success-state');
                btn.style.opacity = '1';
                
                setTimeout(() => {
                    // Reset
                    btn.textContent = originalText;
                    btn.classList.remove('success-state');
                    btn.style.pointerEvents = 'auto';
                    e.target.reset();
                }, 2500);
            }, 1000);
        });
    </script>
</body>
</html>
